<!DOCTYPE html>
<html lang="tr">

<head>
    <link rel="icon" type="image/png" href="../foto/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Paneli - YGT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../stiller/styles.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("_Cw6kyPWX_IFJmlvv");
        })();
    </script>
    <link rel="stylesheet" href="../stiller/admin.css">
</head>

<body>
    <header class="head scrolled">
        <nav class="navbar">
            <a href="../index.html" class="Logo_main">
                <img src="../foto/logo.png" alt="Logo" class="nav-logo">
                <div class="logo-text-group">
                    <span class="txt-upper">YGT</span>
                    <span class="txt-lower">Yönetim</span>
                </div>
            </a>
            <div class="user-actions">
                <a href="egitim.html" class="nav-link" style="margin-right: 20px;">Dashboard'a Dön</a>
                <button class="logout-btn" id="logoutBtn" style="padding: 8px 15px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #ef4444; border-radius: 8px; cursor: pointer;">Çıkış Yap</button>
            </div>
        </nav>
    </header>

    <main class="admin-container">
        <!-- Blog Yazısı Ekleme Bölümü -->
        <section class="admin-section glass-panel">
            <h2><span></span> Yeni Blog Yazısı Ekle</h2>
            <form id="addBlogForm" class="admin-form">
                <div class="form-group">
                    <label>Blog Başlığı</label>
                    <input type="text" id="bBaslik" placeholder="Örn: React ile State Yönetimi" required>
                </div>
                <div class="form-group">
                    <label>Yazar</label>
                    <input type="text" id="bYazar" placeholder="Adınız Soyadınız" required>
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Fotoğraf Dosya Adı (Örn: resim.jpg)</label>
                    <input type="text" id="bFotoIsim" placeholder="foto klasöründeki dosya adı" required>
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Blog İçeriği (HTML destekler)</label>
                    <textarea id="bIcerik" rows="8" placeholder="Blog içeriğini buraya yazın..." required></textarea>
                </div>
                <button type="submit" class="btn-primary" id="blogSubmitBtn" style="grid-column: span 2; margin-top: 10px;">Blogu Yayınla</button>
            </form>
        </section>

        <!-- Soru Ekleme Bölümü -->
        <section class="admin-section glass-panel">
            <h2><span></span> Yeni Soru Ekle</h2>
            <form id="addQuestionForm" class="admin-form">
                <div class="form-group" style="grid-column: span 2;">
                    <label>Soru Başlığı (Kategori)</label>
                    <input type="text" id="qBaslik" placeholder="Örn: JavaScript Temelleri" required>
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Soru Metni</label>
                    <textarea id="qMetin" rows="3" placeholder="Soruyu buraya yazın..." required></textarea>
                </div>
                <div class="form-group">
                    <label>Seçenek 1</label>
                    <input type="text" class="qSecenek" placeholder="A şıkkı" required>
                </div>
                <div class="form-group">
                    <label>Seçenek 2</label>
                    <input type="text" class="qSecenek" placeholder="B şıkkı" required>
                </div>
                <div class="form-group">
                    <label>Seçenek 3</label>
                    <input type="text" class="qSecenek" placeholder="C şıkkı" required>
                </div>
                <div class="form-group">
                    <label>Seçenek 4</label>
                    <input type="text" class="qSecenek" placeholder="D şıkkı" required>
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Doğru Cevap (Yukarıdaki seçeneklerden biriyle tam eşleşmeli)</label>
                    <input type="text" id="qDogru" placeholder="Örn: 42" required>
                </div>
                <button type="submit" class="btn-primary" style="grid-column: span 2; margin-top: 10px;">Soruyu Yayınla</button>
            </form>
        </section>

        <!-- Ödev Yayınlama Bölümü -->
        <section class="admin-section glass-panel">
            <h2><span></span> Yeni Ödev Yayınla</h2>
            <form id="addAssignmentForm" class="admin-form">
                <div class="form-group" style="grid-column: span 2;">
                    <label>Ödev Başlığı</label>
                    <input type="text" id="aBaslik" placeholder="Örn: Hafta 1: HTML/CSS Giriş" required>
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Ödev Açıklaması ve Yönergeler</label>
                    <textarea id="aMetin" rows="5" placeholder="Öğrencilerin ne yapması gerektiğini detaylıca yazın..." required></textarea>
                </div>
                <button type="submit" class="btn-primary" style="grid-column: span 2; margin-top: 10px;">Ödevi Yayınla (Aktif Olarak)</button>
            </form>
        </section>

        <!-- Soru, Ödev ve Blog Yönetim Listeleri -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;">
            <section class="admin-section glass-panel">
                <h2><span></span> Soruları Yönet</h2>
                <div id="manageQuestionsList" class="submissions-list">
                    <p class="no-data">Yükleniyor...</p>
                </div>
            </section>
            <section class="admin-section glass-panel">
                <h2><span></span> Ödevleri Yönet</h2>
                <div id="manageAssignmentsList" class="submissions-list">
                    <p class="no-data">Yükleniyor...</p>
                </div>
            </section>
            <section class="admin-section glass-panel">
                <h2><span></span> Blogları Yönet</h2>
                <div id="manageBlogsList" class="submissions-list">
                    <p class="no-data">Yükleniyor...</p>
                </div>
            </section>
        </div>

        <!-- Ödev Değerlendirme Bölümü -->
        <section class="admin-section glass-panel">
            <h2><span></span> Bekleyen Ödevler</h2>
            <div id="submissionsList" class="submissions-list">
                <p class="no-data">Bekleyen ödevler yükleniyor...</p>
            </div>
        </section>

        <!-- Öğrenci Cevapları / İtirazlar Bölümü -->
        <section class="admin-section glass-panel">
            <h2><span></span> Öğrenci Cevapları & Mesajlar</h2>
            <div id="studentRepliesList" class="submissions-list">
                <p class="no-data">Mesajlar yükleniyor...</p>
            </div>
        </section>
    </main>

    <script type="module" src="../js/admin.js"></script>
</body>

</html>
